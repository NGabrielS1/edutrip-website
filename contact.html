<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Add metatag for description and keywords -->
    <meta name="description" content="Santa Laurensia's 2026 Edutrip">
    <meta name="keywords" content="edutrip, japan, japan edutrip, santa laurensia, edutrip 2026">
    <script src="https://kit.fontawesome.com/f712955866.js" crossorigin="anonymous"></script>

    <!-- Link to style.css file inside css folder -->
    <link rel="stylesheet" href="style.css">
    <link href="mobile.css" rel="stylesheet" media="screen and (max-width: 768px)">

    <!-- Set title as "Hotel BT | Welcome" -->
    <title>Edutrip 2026 | Contact</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>


</head>

<body>
    <header>
        <!-- add id of navbar to nav element  -->
        <nav id="navbar" class="dark-shade">
            <!-- add class of logo to h1 element -->
            <img class="logo" src="./assets/logo.png">
            <ul>
                <!-- Add index.html, about.html and contact.html as links inside list items-->
                <li><a href="index.html">Home page</a></li>
                <li><a href="activity.html">Activity directory</a></li>
                <li><a href="culinary.html">Culinary delicacies</a></li>
                <li><a href="tourist.html">Tourist Destination</a></li>
                <li><a class="current" href="contact.html">Contact us</a></li>
            </ul>
        </nav>
    </header>
    <section id="contact-info">
        <form id="contact-form">
            <h1>Get In Touch</h1>
            <label>Your Name</label><input type="text" name="from_name" placeholder="Your full name"><br>
            <label>Email Address</label><input type="email" name="from_email" placeholder="Your email address"><br>
            <label class="clear">Message</label><br>
            <textarea name="message" placeholder="Write something..."></textarea><br>
            <button type="submit" class="btn">Send Message</button>
        </form>
    </section>
    <script src="script.js"></script>
    <script>
        emailjs.init("Qawi49V2ey8B8Xe5r");

        document.querySelector("#contact-form").addEventListener("submit", function(e) {
        e.preventDefault();
        emailjs.sendForm("service_vx4ng8m", "template_rc8eocn", this)
            .then(() => alert("Message sent!"))
            .catch((err) => alert("Something went wrong"));
        });
    </script>
</body>

</html>
